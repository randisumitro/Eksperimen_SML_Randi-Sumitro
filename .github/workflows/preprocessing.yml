name: Automated Preprocessing Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn seaborn matplotlib jupyter
        
    - name: Run automated preprocessing
      run: |
        cd preprocessing
        python automate_Randi-Sumitro.py
        
    - name: Commit and push processed data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/data_preprocessed/
        git diff --staged --quiet || git commit -m "Automated preprocessing completed [skip ci]"
        git push
