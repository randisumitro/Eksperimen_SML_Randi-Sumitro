name: Automated Preprocessing Workflow

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas==2.1.4 numpy==1.26.2 scikit-learn==1.3.2
        pip install seaborn==0.13.0 matplotlib==3.8.2

    - name: Run automated preprocessing
      run: |
        cd preprocessing
        python automate_Randi-Sumitro.py > preprocessing.log 2>&1

    - name: Upload preprocessing results
      uses: actions/upload-artifact@v3
      with:
        name: preprocessing-results
        path: |
          preprocessing/data_preprocessed/
          preprocessing/preprocessing.log
        retention-days: 30
        if-no-files-found: warn

    - name: Commit and push processed data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/data_preprocessed/
        git add preprocessing/preprocessing.log || echo "Log file not found"
        git commit -m "Automated preprocessing completed - $(date)" || echo "No changes to commit"
        git push origin main
